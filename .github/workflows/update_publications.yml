name: Update Publications

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/fetch_publications.py"
      - "scripts/fetch_arxiv.py"

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch publications from NASA ADS
        env:
          ADS_TOKEN: ${{ secrets.ADS_TOKEN }}
        run: python scripts/fetch_publications.py

      - name: Fetch arXiv preprints
        run: python scripts/fetch_arxiv.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publications.json arxiv_preprints.json
          git diff --cached --quiet || git commit -m "chore: update publications and arxiv preprints [skip ci]"
          git push
