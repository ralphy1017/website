name: Update Publications

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:        # allow manual trigger from Actions tab
  push:
    paths:
      - "scripts/fetch_publications.py"

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch publications from NASA ADS
        env:
          ADS_TOKEN: ${{ secrets.ADS_TOKEN }}
        run: python scripts/fetch_publications.py

      - name: Commit updated publications.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publications.json
          git diff --cached --quiet || git commit -m "chore: update publications.json [skip ci]"
          git push
